<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主办方控制台 - SaaS 投票平台</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/auth.js"></script>

    <style>
        /* ==========================================================================
           控制台专属仪表盘布局样式 (Dashboard Layout)
           ========================================================================== */
        body {
            /* 覆盖原本居中的弹性布局，改为适合后台管理系统的顶部对齐布局 */
            justify-content: flex-start;
            padding: 0;
            background-color: #f4f7f6;
        }

        /* 顶部导航栏 */
        .admin-navbar {
            width: 100%;
            background-color: #007bff;
            color: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .admin-navbar h2 {
            margin: 0;
            font-size: 20px;
        }

        .user-info {
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logout-btn {
            background-color: rgba(255, 255, 255, 0.2);
            padding: 6px 12px;
            border-radius: 4px;
            border: none;
            color: white;
            cursor: pointer;
            transition: background 0.2s;
        }

        .logout-btn:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }

        /* 核心内容区 */
        .dashboard-content {
            width: 100%;
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        /* SaaS 项目卡片网格布局 (CSS Grid) */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .project-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #eef2f1;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .project-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
        }

        .project-card h3 {
            margin: 0 0 10px 0;
            color: #333;
            font-size: 18px;
        }

        .project-card p {
            color: #666;
            font-size: 13px;
            line-height: 1.5;
            margin: 0 0 15px 0;
            flex-grow: 1;
        }

        .project-card .meta {
            font-size: 12px;
            color: #999;
            margin-bottom: 15px;
        }

        .manage-btn {
            width: 100%;
            background-color: #007bff;
        }

        /* 模态框 (Modal) 样式 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 8px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .modal-content h3 {
            margin-top: 0;
            margin-bottom: 20px;
        }

        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            min-height: 80px;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-cancel {
            background-color: #6c757d;
        }

        .btn-cancel:hover {
            background-color: #5a6268;
        }
    </style>
</head>

<body>
    <nav class="admin-navbar">
        <h2>⚙️ 投票系统 / 主办方大盘</h2>
        <div class="user-info">
            <span>欢迎您，<strong id="admin-name">加载中...</strong></span>
            <button class="logout-btn" onclick="handleLogout()">安全退出</button>
        </div>
    </nav>

    <main class="dashboard-content">
        <div class="action-bar">
            <h2 style="margin: 0; color: #333;">我的投票项目</h2>
            <button onclick="openModal()" style="background-color: #28a745;">+ 创建新项目</button>
        </div>

        <div class="projects-grid" id="projects-container">
            <p style="color: #666;">正在加载项目数据...</p>
        </div>
    </main>

    <div class="modal-overlay" id="createModal">
        <div class="modal-content">
            <h3>✨ 创建新投票项目</h3>
            <form id="createForm">
                <div class="form-group">
                    <label>项目名称 (必填)</label>
                    <input type="text" id="projectTitle" required placeholder="例如：2026届计算机系十佳歌手选拔">
                </div>
                <div class="form-group" style="margin-top: 15px;">
                    <label>项目简介 (选填)</label>
                    <textarea id="projectDesc" placeholder="简要描述该投票活动的规则或目的..."></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal()">取消</button>
                    <button type="submit" id="submitBtn" style="background-color: #007bff;">确认创建</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ====================================================================
        // 1. 页面初始化与安检拦截 (Security Gate)
        // ====================================================================
        document.addEventListener('DOMContentLoaded', () => {
            // 【前置身份审计】：如果发现游客或冒充选民身份潜入，直接拦截并送走
            if (AuthUtils.getRole() !== 'admin') {
                alert('安全拦截：您不具备活动主办方管理权限！');
                window.location.href = '../login.html?type=admin';
                return;
            }

            // 动态绘制管理员账号名
            document.getElementById('admin-name').textContent = AuthUtils.getUsername();

            // 触发动态多租户大盘抓取
            loadProjects();
        });

        /**
         * 🆕 退出系统按钮处理逻辑：退回首页并清空身份痕迹
         */
        function handleLogout() {
            AuthUtils.clearAuth();
            window.location.href = '../index.html';
        }

        // ====================================================================
        // 2. 动态抓取并多栏渲染项目网格 (BFF Data Binding)
        // ====================================================================
        async function loadProjects() {
            const container = document.getElementById('projects-container');

            try {
                const response = await fetchWithAuth('/projects/list');
                const data = await response.json();

                if (data.success) {
                    const projects = data.data;

                    // 边界保护：若当前大盘空空如也，给出一键引导体验
                    if (projects.length === 0) {
                        container.innerHTML = `
                            <div style="grid-column: 1 / -1; text-align: center; padding: 40px; background: white; border-radius: 8px; border:1px dashed #ccc;">
                                <div style="font-size: 40px; margin-bottom: 15px;">📭</div>
                                <h3 style="color: #333; margin-bottom: 10px;">您目前还没有创建任何投票项目</h3>
                                <p style="color: #666; font-size:14px;">点击右上角的 "创建新项目" 按钮即可同步部署一套区块链密码学选举环境！</p>
                            </div>
                        `;
                        return;
                    }

                    container.innerHTML = ''; // 清空加载态文字

                    // 🚀【重写渲染引擎】：并行拼装“管理大盘”与“红色高危删除”双功能按钮
                    projects.forEach(proj => {
                        const dateStr = new Date(proj.created_at).toLocaleDateString();
                        const statusBadge = proj.status === 1
                            ? `<span style="color: #28a745; font-weight: bold;">🟢 进行中</span>`
                            : `<span style="color: #dc3545; font-weight: bold;">🔴 已结束</span>`;

                        const cardHTML = `
                            <div class="project-card">
                                <h3>${proj.title}</h3>
                                <p>${proj.description || '暂无项目简介'}</p>
                                <div class="meta">
                                    创建时间: ${dateStr} &nbsp;|&nbsp; 状态: ${statusBadge}
                                </div>
                                <div style="display: flex; gap: 10px; margin-top: auto;">
                                    <button class="manage-btn" style="flex: 3; margin: 0;" onclick="goToManage(${proj.id})">进入配置与管理面板 &rarr;</button>
                                    <button class="btn-danger btn-sm" style="flex: 1; padding: 10px 0; font-size: 14px; border-radius: 6px; margin: 0; font-weight:bold;" 
                                            onclick="deleteProject(${proj.id}, '${proj.title}')">删除</button>
                                </div>
                            </div>
                        `;
                        container.innerHTML += cardHTML;
                    });
                }
            } catch (err) {
                container.innerHTML = `<p style="color: red; text-align:center;">🔴 获取多租户大盘失败，请确保 Node.js 和 MySQL 处于通电运行状态。</p>`;
            }
        }

        // ====================================================================
        // 3. 🆕 新增核心函数：高危项目级联数据清理
        // ====================================================================
        async function deleteProject(projectId, projectTitle) {
            // 严格的防误触双重警报拦截
            const firstConfirm = confirm(`⚠️ 极端高危警告 ⚠️\n\n您正准备彻底删除项目：【${projectTitle}】\n\n此操作将永久抹除该选举在 MySQL 中的全部候选人排行榜、大批量导入的选民账号以及所有实名领票日志，且不可逆！\n\n确定要继续执行级联清理吗？`);
            if (!firstConfirm) return;

            const secondConfirm = confirm(`🚨 最终密码学安全核验 🚨\n\n请再次确认：删除此项目后，该项目此前已上链的匿名选票由于其 Sn 无法在 users 表中反查核销，将成为区块链上的永久匿名尘埃（无法统计结果）。\n\n您真的确定要执行删除吗？`);
            if (!secondConfirm) return;

            try {
                // 异步发起 DELETE 请求，交给 Node.js 路由级联洗表
                const response = await fetchWithAuth(`/projects/delete/${projectId}`, {
                    method: 'DELETE'
                });
                const data = await response.json();

                if (data.success) {
                    alert(data.message || "项目及多租户关联环境清理完毕！");
                    loadProjects(); // 无刷新重新拉取卡片矩阵，保证体验连贯性
                } else {
                    alert(`级联清理失败: ${data.message}`);
                }
            } catch (err) {
                console.error("删除项目请求异常:", err);
                alert("网络通道受阻，无法呼叫网关执行删除。");
            }
        }

        // ====================================================================
        // 4. 模态框交互流转
        // ====================================================================
        const modal = document.getElementById('createModal');

        function openModal() { modal.style.display = 'flex'; }
        function closeModal() {
            modal.style.display = 'none';
            document.getElementById('createForm').reset();
        }

        // 提交表单：同步联动创建
        document.getElementById('createForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const title = document.getElementById('projectTitle').value.trim();
            const description = document.getElementById('projectDesc').value.trim();
            const btn = document.getElementById('submitBtn');

            btn.disabled = true;
            btn.textContent = '创建中...';

            try {
                const response = await fetchWithAuth('/projects/create', {
                    method: 'POST',
                    body: JSON.stringify({ title, description })
                });

                const data = await response.json();
                if (data.success) {
                    closeModal();
                    loadProjects();
                } else {
                    alert(data.message);
                }
            } catch (err) {
                alert('部署失败，请核查密码学引擎！');
            } finally {
                btn.disabled = false;
                btn.textContent = '确认创建';
            }
        });

        // 路由流转传参
        function goToManage(projectId) {
            window.location.href = `project_manage.html?project_id=${projectId}`;
        }
    </script>
</body>

</html>
